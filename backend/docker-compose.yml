services:

  app:
    build: .
    container_name: leadforge-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./chroma_db:/app/chroma_db
      - ./uploads:/app/uploads

    depends_on:
      - db

  db:
    image: postgres:16

    container_name: leadforge-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leadforge

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: